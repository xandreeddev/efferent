# Publish the CLI to npm via OIDC trusted publishing — BOTH names from one
# bundle: `efferent` (primary) + `@xandreed/cli` (mirror).
#
# Connect on npmjs.com for EACH name (`efferent` and `@xandreed/cli`): the
# package → Settings → Trusted Publisher → GitHub Actions → owner `xandreeddev`,
# repo `efferent`, workflow `publish-cli.yml`. Then run this workflow to publish
# the current packages/cli version (builds the Bun bundle, audits it for baked
# paths, `npm publish`es both names; skips if that version is already on npm).
name: publish efferent (cli)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC — npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun scripts/publish.ts efferent
