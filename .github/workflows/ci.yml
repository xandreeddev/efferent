# Gate every push to main and every PR: typecheck (tsc + the foundry gate
# suite — core purity, Effect idioms behind the ratchet baseline, dependency
# direction) + the foundry E2E demo + the test suite.
#
# This is the lock that makes the rules un-ignorable: enable branch
# protection on `main` requiring the `ci` check (Settings → Branches →
# Require status checks → ci; no admin bypass), and a violation can neither
# be merged nor pushed to main.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # tsc + foundry self-check (the dogfood) + the ratcheted repo gate suite.
      - run: bun run typecheck

      # Foundry's key-free E2E: the forge loop over a scripted implementor.
      - run: bun run foundry demo

      # Eval suites are key-gated and skip cleanly in CI; unit tests run.
      - run: bun test
