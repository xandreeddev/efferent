# Build the documentation site (packages/website/, hand-built Astro) and deploy
# it to GitHub Pages — the project page at https://xandreeddev.github.io/efferent/.
#
# One-time setup: enable Pages with source "GitHub Actions"
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#   (or: gh api -X POST /repos/xandreeddev/efferent/pages -f build_type=workflow)
#
# packages/website is a Bun workspace member, so it installs from the root
# bun.lock — one `bun install` at the repo root resolves its deps.
name: docs

on:
  push:
    branches: [main]
    paths:
      - "packages/website/**"
      - "examples/**" # docs render example sources via ?raw
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-flight one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The docs site is a workspace member — install the whole workspace from
      # the root lockfile, then build/check inside its package dir.
      - run: bun install --frozen-lockfile

      - run: bun run build
        working-directory: packages/website

      - name: Check every internal link resolves
        run: bun run linkcheck
        working-directory: packages/website

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
