# Changesets-driven release for the whole monorepo. Every push to main runs the
# Changesets action, which does one of two things:
#
#   • If there are pending `.changeset/*.md` files → it opens/updates a
#     "Version Packages" PR that bumps each affected package + writes its
#     CHANGELOG (the `version` command below).
#   • If there are none (i.e. that PR was just merged) → it runs the `publish`
#     command, which builds + publishes every package whose version isn't yet on
#     npm (`scripts/publish.ts`), then creates the git tags + GitHub releases
#     from the `New tag:` lines the script prints.
#
# Auth is npm **trusted publishing** (OIDC) — no token secret. One-time setup on
# npmjs.com, FOR EACH published name (`efferent`, `@xandreed/cli`,
# `@xandreed/sdk-core`, `@xandreed/sdk-adapters`, `@xandreed/evals`): Settings →
# Trusted publisher → GitHub Actions → owner `xandreeddev`, repo `efferent`,
# workflow `release.yml`. A brand-new scoped name needs ONE manual bootstrap
# publish first (OIDC can't create a name that doesn't exist yet) — see
# CONTRIBUTING.md. Publishing emits a provenance attestation.
#
# Authoring a release: add a changeset with `bun run changeset` in your PR. On
# merge to main the Version PR appears; merging IT publishes.
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write # create tags + GitHub releases, push the Version PR
  pull-requests: write # open/update the Version Packages PR
  id-token: write # OIDC — npm trusted publishing + provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm ≥ 11.5.1 is required for trusted publishing; node 24 ships it.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      # `version` maintains the Version PR (bump + CHANGELOGs + refresh bun.lock);
      # `publish` (run only once that PR is merged) gates on typecheck + tests,
      # builds the libs + the CLI bundle, then publishes via OIDC. The action
      # tags + creates GitHub releases from the script's `New tag:` lines.
      - uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
