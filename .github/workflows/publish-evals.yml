# Publish @xandreed/evals to npm via OIDC trusted publishing.
#
# Connect on npmjs.com: package @xandreed/evals → Settings → Trusted Publisher
# → GitHub Actions → owner `xandreeddev`, repo `efferent`, workflow
# `publish-evals.yml`. Then run this workflow to publish the current version
# (builds the libs, rewrites the manifest to dist + real dep ranges,
# `npm publish`; skips if already on npm).
name: publish @xandreed/evals

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC — npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun scripts/publish.ts @xandreed/evals
