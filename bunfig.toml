# Solid JSX transform for the OpenTUI TUI (packages/cli/src/tui-solid/*.tsx).
# The preload registers a Bun plugin scoped to `.tsx`/`.jsx` files only — plain
# `.ts` across core/adapters/cli is untouched, so the "Bun runs .ts directly,
# no build step" convention holds everywhere except the JSX-only tui-solid dir.
# Loading this does NOT import the native @opentui/core, so non-TUI runs
# (tests, evals, print/json/rpc modes) never touch the native lib.
preload = ["@opentui/solid/preload"]

# `bun test` does not honor the top-level `preload`; it reads `[test] preload`.
[test]
preload = ["@opentui/solid/preload"]
