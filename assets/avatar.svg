<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64" role="img" aria-label="efferent">
  <title>efferent</title>
  <defs>
    <linearGradient id="av-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffa657"/>
      <stop offset="50%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="av-glow" cx="0.68" cy="0.28" r="0.85">
      <stop offset="0%" stop-color="#ffa657" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#ffa657" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- full-bleed background (GitHub crops to a circle; corners are discarded) -->
  <rect width="64" height="64" fill="#161310"/>
  <rect width="64" height="64" fill="url(#av-glow)"/>
  <!-- the brand 'e' + gradient bar, centered within the safe circle -->
  <text x="32" y="42" text-anchor="middle"
    font-family="'DejaVu Sans Mono','Liberation Mono','Courier New',monospace" font-size="44" font-weight="700"
    fill="#ece7df">e</text>
  <rect x="16" y="49" width="32" height="5" rx="2.5" fill="url(#av-bar)"/>
</svg>
